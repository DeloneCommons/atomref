name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev,notebook]
      - name: Lint
        run: flake8 src tests tools
      - name: Validate packaged registry
        run: python tools/check_registry.py
      - name: Validate notebooks
        run: python tools/check_notebooks.py
      - name: Check notebook exports
        run: python tools/export_notebooks.py --check
      - name: Check README sync
        run: python tools/gen_readme.py --check

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[docs]
      - name: Export notebooks and README
        run: |
          python tools/export_notebooks.py --check
          python tools/gen_readme.py --check
      - name: Build docs
        run: mkdocs build --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test,notebook]
      - name: Test
        run: pytest

  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Validate metadata
        run: python -m twine check dist/*
      - name: Check packaged files
        run: python tools/check_dist.py dist
      - name: Install built wheel and smoke-test it
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python - <<'PY'
          import atomref as ar

          assert ar.get_covalent_radius('C') == 0.76
          assert ar.get_vdw_radius('C') == 1.77
          assert 'atomic_radius' in ar.list_quantities()
          assert 'rahm2016' in ar.list_dataset_ids('atomic_radius', usage_role='support')
          ref = ar.DatasetRef(
              'proatomic_density',
              'pbe0_sfx2c_dyallv4z_h-lr_neutral_v2',
          )
          dataset = ar.get_builtin_set(ref)
          assert dataset.get('O') is not None
          rho = ar.get_proatomic_density(
              'O',
              0.75,
              radius_unit='angstrom',
              density_unit='electron/bohr^3',
          )
          assert rho is not None and rho > 0
          boundary = ar.estimate_proatomic_boundary('C', 'O', 1.43)
          assert boundary is not None and boundary.position_from_a is not None
          minimum = ar.estimate_promolecular_density_minimum('C', 'O', 1.43)
          assert minimum is not None
          selected = ar.estimate_ias_position('C', 'O', 1.43, mode='boundary')
          assert selected == boundary
          PY
